name: portable checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  portable:
    runs-on: windows-2025

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run doctor
        shell: pwsh
        run: ./scripts/doctor.ps1

      - name: Check tracked text whitespace
        shell: pwsh
        run: |
          $bad = @()
          $files = git ls-files |
            Where-Object { $_ -match "\.(md|ps1|toml|json|ya?ml|txt)$" }
          foreach ($file in $files) {
            $lineNumber = 0
            foreach ($line in Get-Content -LiteralPath $file) {
              $lineNumber += 1
              if ($line -match "[ \t]$") {
                $bad += "${file}:$lineNumber"
              }
            }
          }
          if ($bad.Count -gt 0) {
            $bad | ForEach-Object { Write-Host "trailing whitespace: $_" }
            exit 1
          }

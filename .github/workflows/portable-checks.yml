name: portable checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  portable_matrix:
    name: portable (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-2025
          - ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run doctor
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $codexHome = Join-Path $env:RUNNER_TEMP "codex-home"
          $agentsHome = Join-Path $env:RUNNER_TEMP "agents-home"
          $claudeHome = Join-Path $env:RUNNER_TEMP "claude-home"
          New-Item -ItemType Directory -Force $codexHome, $agentsHome, $claudeHome | Out-Null
          ./scripts/doctor.ps1 -CodexHome $codexHome -AgentsHome $agentsHome -ClaudeHome $claudeHome

      - name: Compile Python sources
        shell: pwsh
        run: |
          $files = @(
            Get-ChildItem codex/hooks -Recurse -File -Filter *.py
            Get-ChildItem codex/skills -Recurse -File -Filter *.py
            Get-ChildItem carried -Recurse -File -Filter *.py
            Get-ChildItem scripts -File -Filter *.py
          )
          foreach ($file in $files) {
            python -m py_compile $file.FullName
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

      - name: Test Compass architecture
        shell: pwsh
        run: python scripts/test-compass-architecture.py

      - name: Test behavior-validator isolation
        shell: pwsh
        run: python scripts/test-behavior-validator-workspace.py

      - name: Test reviewed config
        shell: pwsh
        run: python scripts/test-reviewed-config.py

      - name: Test skill audit
        shell: pwsh
        run: python scripts/test-skills-audit.py

      - name: Test skill source provenance
        shell: pwsh
        run: python scripts/test-validate-skill-sources.py

      - name: Test retired plugin migration
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/test-retire-plugins.ps1

      - name: Test review bundle isolation
        shell: pwsh
        run: python scripts/test-review-bundle.py

      - name: Validate policy contracts
        shell: pwsh
        run: python scripts/validate-policy-contracts.py

      - name: Validate skill sources
        shell: pwsh
        run: python scripts/validate-skill-sources.py

      - name: Check shell launcher syntax
        if: runner.os == 'Linux'
        shell: bash
        run: bash -n codex/hooks/portable_guard.sh

      - name: Check shell line endings
        shell: pwsh
        run: |
          $bad = @()
          foreach ($file in Get-ChildItem -Recurse -File -Filter *.sh) {
            $bytes = [System.IO.File]::ReadAllBytes($file.FullName)
            for ($index = 0; $index -lt $bytes.Length - 1; $index += 1) {
              if ($bytes[$index] -eq 13 -and $bytes[$index + 1] -eq 10) {
                $bad += $file.FullName
                break
              }
            }
          }
          if ($bad.Count -gt 0) {
            $bad | ForEach-Object { Write-Host "CRLF shell file: $_" }
            exit 1
          }

      - name: Check tracked text whitespace
        shell: pwsh
        run: |
          $bad = @()
          $files = git ls-files |
            Where-Object { $_ -match "\.(md|ps1|py|sh|toml|json|ya?ml|txt)$" }
          foreach ($file in $files) {
            $lineNumber = 0
            foreach ($line in Get-Content -LiteralPath $file) {
              $lineNumber += 1
              if ($line -match "[ \t]$") {
                $bad += "${file}:$lineNumber"
              }
            }
          }
          if ($bad.Count -gt 0) {
            $bad | ForEach-Object { Write-Host "trailing whitespace: $_" }
            exit 1
          }

  portable:
    name: portable
    needs: portable_matrix
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Require portable matrix
        shell: bash
        run: test "${{ needs.portable_matrix.result }}" = "success"

  install-roundtrip:
    runs-on: windows-2025

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run install round trip
        id: roundtrip
        continue-on-error: true
        shell: pwsh
        run: ./scripts/test-install-roundtrip.ps1

      - name: Upload round-trip diagnostics
        if: steps.roundtrip.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: install-roundtrip-diagnostics
          path: compass-roundtrip-error.txt
          if-no-files-found: error

      - name: Fail failed round trip
        if: steps.roundtrip.outcome == 'failure'
        shell: pwsh
        run: exit 1

  compass-mcp:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install MCP dependencies
        working-directory: apps/compass-mcp
        run: npm install

      - name: Build MCP app
        working-directory: apps/compass-mcp
        run: npm run build

      - name: Smoke test MCP app
        working-directory: apps/compass-mcp
        run: npm run smoke

      - name: Smoke test MCP Worker
        working-directory: apps/compass-mcp
        run: npm run smoke:worker

# Reviewed Codex config fragments.
#
# Do not install this file over the live config.toml automatically. The live file
# also contains generated marketplace state, runtime paths, MCP wiring, project
# trust entries, and app migration markers that belong to the current machine.
#
# This reviewed fragment intentionally reflects the user's trusted-machine
# default for local work. Use bounded workflows or runtime flags for lower-trust
# tasks instead of mixing several config models into one portable fragment.
#
# Keep this fragment on one permissions model at a time. It currently stays on
# the older sandbox keys and should not mix in `default_permissions` or
# `[permissions]` entries without a deliberate migration.

approvals_reviewer = "auto_review"
model = "gpt-5.5"
model_reasoning_effort = "xhigh"
personality = "pragmatic"
service_tier = "default"
sandbox_mode = "danger-full-access"
approval_policy = "on-request"

[windows]
sandbox = "elevated"

[notice]
hide_full_access_warning = true

[features]
terminal_resize_reflow = true
memories = true
external_migration = true
goals = true
prevent_idle_sleep = true
js_repl = false

[desktop]
conversationDetailMode = "STEPS_COMMANDS"
ambient-suggestions-enabled = false
appearanceTheme = "dark"
followUpQueueMode = "steer"
composerEnterBehavior = "cmdIfMultiline"
show-context-window-usage = true
hotkey-window-projectless-default-enabled = true
dictationDictionary = ["ariobarin", "webmcp"]
keepRemoteControlAwakeWhilePluggedIn = true
git-branch-prefix = "ario-"
git-pull-request-merge-method = "squash"
git-show-sidebar-pr-icons = true
git-pr-instructions = """
## Writing style
- Never use em dashes or en dashes anywhere: commits, code comments, prose, chat replies. Use a regular hyphen, comma, colon, parentheses, or two sentences instead.
- Do not name personal preferences in commit messages or other public artifacts. Describe changes neutrally, such as "clean up tool docs".

## Commit messages
- Single short lowercase subject line, around 8 words or fewer. No body, no `Co-Authored-By` trailer.
- Past-tense imperatives like "add", "fix", "move", and "return" are fine. No trailing punctuation, no leading capital.

## Pull requests
- Descriptive title, often verb-led. No `feat:`, `fix:`, or `chore:` prefixes. Title need not match the commit subject.
- Body is optional and minimal: 0-2 sentences, lead with motivation or why, not what changed. Empty body is fine.
- No markdown headers, checkboxes, emojis, or "Generated with Codex" footer."""

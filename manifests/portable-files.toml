# Human-owned Codex setup files that this repo is allowed to track.

[codex]
# The live target is the active Codex home: $CODEX_HOME when set, otherwise
# the default %USERPROFILE%\.codex path.
home = "$CODEX_HOME or %USERPROFILE%\\.codex"

files = [
  "AGENTS.md",
  "hooks.json",
  "keybindings.json",
]

dirs = [
  "agents",
  "hooks",
]

[agents]
# User skills install to the current user skill home, separate from the
# Codex home used for AGENTS.md, keybindings, and custom agents.
home = "$HOME\\.agents"
skills_dir = "$HOME\\.agents\\skills"

skills = [
  "action-items-to-prs",
  "benchmark-infra-reviewer",
  "benchmark-run-operator",
  "compass",
  "git-branch-resolver",
  "grill-me",
  "input-token-economy",
  "monitor-to-completion",
  "orchestration-controller",
  "pr-merge-closeout",
  "pr-review-loop",
  "root-cause-not-symptom",
  "specialist-review",
  "subagent-driven-development",
  "to-prd",
  "update-compass",
  "using-codex-goals",
  "webmcp-eval-triage",
  "webmcp-tool-authoring",
  "webmcp-verify-tool",
  "workspace-steward",
  "write-a-skill",
]

[claude]
# The live target is the active Claude home: $HOME/.claude. Claude skills
# install to ~/.claude/skills and agents to ~/.claude/agents.
home = "$HOME\\.claude"
skills_dir = "$HOME\\.claude\\skills"
agents_dir = "$HOME\\.claude\\agents"

# Claude skills derive from the reviewed codex/skills source at install time by
# default. List a skill under `derived_skills` to generate it from
# codex/skills/<name> (SKILL.md plus references/, dropping agents/openai.yaml).
# Keep a skill under `skills` only when it carries Claude-specific wording that
# cannot be derived; that claude/skills/<name> source is the override.
skills = [
  "action-items-to-prs",
  "compass",
  "orchestration-controller",
  "pr-review-loop",
  "subagent-driven-development",
  "write-a-skill",
]

derived_skills = [
  "benchmark-infra-reviewer",
  "benchmark-run-operator",
  "git-branch-resolver",
  "grill-me",
  "input-token-economy",
  "monitor-to-completion",
  "specialist-review",
  "to-prd",
  "workspace-steward",
]

agents = [
  "algorithm-critic",
  "neutral-critic",
  "repo-explorer",
  "research-critic",
  "reuse-critic",
  "reviewer",
  "verifier",
]

[config]
review_file = "config.review.toml"
install_automatically = false
reason = "Live config.toml includes generated runtime paths, marketplaces, project trust, and MCP server wiring."

[repo_only]
# These paths are repository-root paths. The [codex] section above maps files
# from the repo's codex/ directory into the live Codex home. The [agents]
# section maps repo skills into the user skill home.
files = [
  ".gitattributes",
  ".gitignore",
  "AGENTS.md",
  "CODE_OF_CONDUCT.md",
  "CONTRIBUTING.md",
  "LICENSE",
  "README.md",
  "SECURITY.md",
  "SUPPORT.md",
  "philosophy.md",
]

dirs = [
  ".github",
  "local-docs",
  "manifests",
  "scripts",
  "workflows",
]
reason = "These files guide repository maintenance but are not installed into a live Codex home or user skill home."

[local_only]
files = [
  "AGENTS.override.md",
  "auth.json",
  "history.jsonl",
  "session_index.jsonl",
  "installation_id",
  "cap_sid",
  "models_cache.json",
  ".codex-global-state.json",
]

dirs = [
  ".sandbox",
  ".sandbox-bin",
  ".sandbox-secrets",
  ".tmp",
  ".local",
  "archived_sessions",
  "automations",
  "browser",
  "cache",
  "computer-use",
  "log",
  "memories",
  "memories_extensions",
  "node_repl",
  "plugins",
  "process_manager",
  "rules",
  "sessions",
  "sqlite",
  "threads",
  "tmp",
  "vendor_imports",
  "worktrees",
]

patterns = [
  "*.sqlite",
  "*.sqlite-shm",
  "*.sqlite-wal",
  "*.log",
]

# Human-owned Codex setup files that this repo is allowed to track.

[codex]
# The live target is the active Codex home: $CODEX_HOME when set, otherwise
# the default %USERPROFILE%\.codex path.
home = "$CODEX_HOME or %USERPROFILE%\\.codex"

files = [
  "AGENTS.md",
  "hooks.json",
  "keybindings.json",
]

dirs = [
  "agents",
  "hooks",
]

[agents]
# User skills install to the current user skill home, separate from the
# Codex home used for AGENTS.md, keybindings, and custom agents.
home = "$HOME\\.agents"
skills_dir = "$HOME\\.agents\\skills"

skills = [
  "action-items-to-prs",
  "behavior-validator",
  "compass",
  "design-taste-frontend",
  "git-branch-resolver",
  "grill-me",
  "monitor-to-completion",
  "orchestration-controller",
  "pr-review-loop",
  "root-cause-not-symptom",
  "run-a-micro-experiment",
  "specialist-review",
  "subagent-driven-development",
  "to-prd",
  "update-compass",
  "using-goals",
  "which-llm",
  "workspace-steward",
  "write-a-compass-skill",
  "write-a-skill",
]

# These skills write refresh data, exports, and Python caches inside their live
# directory. Compass manages their code while preserving those runtime paths.
stateful_skills = [
  "which-llm",
]

[claude]
# The live target is the active Claude home: $HOME/.claude. Claude skills
# install to ~/.claude/skills and agents to ~/.claude/agents.
home = "$HOME\\.claude"
skills_dir = "$HOME\\.claude\\skills"
agents_dir = "$HOME\\.claude\\agents"

files = [
  "CLAUDE.md",
]

# Claude skills derive from the reviewed codex/skills source at install time.
# List a skill under `derived_skills` to copy SKILL.md plus references/,
# scripts/, and assets/, dropping agents/openai.yaml.
derived_skills = [
  "action-items-to-prs",
  "behavior-validator",
  "compass",
  "design-taste-frontend",
  "git-branch-resolver",
  "grill-me",
  "monitor-to-completion",
  "orchestration-controller",
  "pr-review-loop",
  "root-cause-not-symptom",
  "run-a-micro-experiment",
  "specialist-review",
  "subagent-driven-development",
  "to-prd",
  "using-goals",
  "workspace-steward",
  "write-a-compass-skill",
  "write-a-skill",
]

# No Claude agent is maintained as a separate source. Every Claude agent
# derives from codex/agents/*.toml at install time; see derived_agents below.
agents = []

# Other Claude agents derive from codex/agents/<name>.toml at install time.
derived_agents = [
  "behavior-validator",
  "algorithm-critic",
  "neutral-critic",
  "progress-monitor",
  "repo-explorer",
  "research-critic",
  "reuse-critic",
  "reviewer",
  "verifier",
]

[config]
review_file = "config.review.toml"
install_mode = "overlay"
reason = "Reviewed keys overlay live config.toml while generated and machine-local state remains untouched."

[repo_only]
# These paths are repository-root paths. Installed Codex and Claude surfaces are
# mapped above. Carried packs are opt-in project resources and are not installed.
files = [
  ".gitattributes",
  ".gitignore",
  "AGENTS.md",
  "CODE_OF_CONDUCT.md",
  "CONTRIBUTING.md",
  "glossary.md",
  "LICENSE",
  "README.md",
  "SECURITY.md",
  "SUPPORT.md",
  "philosophy.md",
]

dirs = [
  ".github",
  "apps",
  "assets",
  "carried",
  "local-docs",
  "manifests",
  "scripts",
  "workflows",
]
reason = "These paths guide repository maintenance or carry opt-in project packs but are not installed into a live Codex home, user skill home, or Claude home."

[local_only]
files = [
  "AGENTS.override.md",
  "auth.json",
  "history.jsonl",
  "session_index.jsonl",
  "installation_id",
  "cap_sid",
  "models_cache.json",
  ".codex-global-state.json",
]

dirs = [
  ".sandbox",
  ".sandbox-bin",
  ".sandbox-secrets",
  ".tmp",
  ".local",
  "archived_sessions",
  "automations",
  "browser",
  "cache",
  "computer-use",
  "log",
  "memories",
  "memories_extensions",
  "node_repl",
  "plugins",
  "process_manager",
  "rules",
  "sessions",
  "sqlite",
  "threads",
  "tmp",
  "vendor_imports",
  "worktrees",
]

patterns = [
  "*.sqlite",
  "*.sqlite-shm",
  "*.sqlite-wal",
  "*.log",
]

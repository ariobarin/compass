# Human-owned Codex files that this repo is allowed to track.

[codex]
home = "%USERPROFILE%\\.codex"

files = [
  "AGENTS.md",
  "keybindings.json",
]

dirs = [
  "agents",
]

skills = [
  "action-items-to-prs",
  "benchmark-infra-reviewer",
  "benchmark-run-operator",
  "git-branch-resolver",
  "grill-me",
  "orchestration-controller",
  "subagent-driven-development",
  "to-prd",
  "ui-ux-pro-max",
  "using-codex-goals",
  "webmcp-eval-triage",
  "webmcp-tool-authoring",
  "webmcp-verify-tool",
  "write-a-skill",
]

[config]
review_file = "config.review.toml"
install_automatically = false
reason = "Live config.toml includes generated runtime paths, marketplaces, project trust, and MCP server wiring."

[repo_only]
# These paths are repository-root paths. The [codex] section above maps files
# from the repo's codex/ directory into the live Codex home.
files = [
  "AGENTS.md",
  "README.md",
]

dirs = [
  "local-docs",
  "manifests",
  "scripts",
  "workflows",
]
reason = "These files guide repository maintenance but are not installed into a live Codex home."

[local_only]
files = [
  "auth.json",
  "history.jsonl",
  "session_index.jsonl",
  "installation_id",
  "cap_sid",
  "models_cache.json",
  ".codex-global-state.json",
]

dirs = [
  ".sandbox",
  ".sandbox-bin",
  ".sandbox-secrets",
  ".tmp",
  "archived_sessions",
  "automations",
  "browser",
  "cache",
  "computer-use",
  "log",
  "memories",
  "node_repl",
  "plugins",
  "process_manager",
  "sessions",
  "sqlite",
  "tmp",
  "vendor_imports",
  "worktrees",
]

patterns = [
  "*.sqlite",
  "*.sqlite-shm",
  "*.sqlite-wal",
  "*.log",
]
